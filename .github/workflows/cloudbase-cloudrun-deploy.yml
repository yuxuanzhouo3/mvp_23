name: Deploy to CloudBase CloudRun

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install CloudBase CLI
        run: npm i -g @cloudbase/cli

      - name: Login CloudBase
        run: tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy CloudRun service
        run: |
          tcb cloudrun deploy \
            --envId "${{ secrets.TCB_ENV_ID }}" \
            --name "${{ secrets.TCB_RUN_NAME }}" \
            --source .

